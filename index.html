<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chen Song | Senior Software Engineer & AI Specialist</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            noto: ['Noto Sans SC', 'sans-serif'],
            poppins: ['Poppins', 'sans-serif'],
            dancing: ['Dancing Script', 'cursive'],
          },
          colors: {
            primary: '#00f5ff',
            secondary: '#bf00ff',
            accent: '#00ff88',
            dark: '#0a0a0a',
          }
        }
      }
    }
  </script>

  <style>
    /* ===== CSS VARIABLES FOR THEMES ===== */
    :root {
      /* Dark Mode (Default) */
      --bg-primary: #0a0a0a;
      --bg-secondary: #0d1117;
      --bg-card: rgba(10,14,23,0.8);
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.7);
      --text-muted: rgba(255,255,255,0.5);
      --accent-cyan: #00f5ff;
      --accent-purple: #bf00ff;
      --accent-green: #00ff88;
      --border-color: rgba(0,245,255,0.15);
      --shadow-glow: rgba(0,245,255,0.3);
      --banner-bg: linear-gradient(135deg, rgba(0,245,255,0.1), rgba(191,0,255,0.05));
    }

    /* Light Mode */
    body.light-mode {
      --bg-primary: #f5f7fa;
      --bg-secondary: #ffffff;
      --bg-card: rgba(255,255,255,0.9);
      --text-primary: #1a1a2e;
      --text-secondary: rgba(26,26,46,0.7);
      --text-muted: rgba(26,26,46,0.5);
      --accent-cyan: #0088aa;
      --accent-purple: #9933ff;
      --accent-green: #00aa55;
      --border-color: rgba(0,136,170,0.2);
      --shadow-glow: rgba(0,136,170,0.2);
      --banner-bg: linear-gradient(135deg, rgba(0,136,170,0.08), rgba(153,51,255,0.05));
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', 'Noto Sans SC', 'Poppins', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
      font-size: 1rem;
      line-height: 1.8;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--accent-cyan), var(--accent-purple)); border-radius: 3px; }

    /* ===== TOP ANNOUNCEMENT BANNER ===== */
    .top-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9998;
      background: var(--banner-bg);
      border-bottom: 1px solid var(--border-color);
      backdrop-filter: blur(10px);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .banner-dot {
      width: 6px;
      height: 6px;
      background: var(--accent-cyan);
      border-radius: 50%;
      animation: bannerPulse 2s ease-in-out infinite;
    }
    @keyframes bannerPulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    .banner-text {
      font-size: 0.8rem;
      color: var(--accent-cyan);
      letter-spacing: 0.15em;
      animation: bannerBreath 3s ease-in-out infinite;
      font-family: 'Noto Sans SC', sans-serif;
    }
    /* Breathing glow for banner text - only transform/opacity for performance */
    @keyframes bannerBreath {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* ===== WAVING HAND ANIMATION ===== */
    .waving-hand {
      display: inline-block;
      width: 40px;
      height: 40px;
      animation: wave 2s ease-in-out infinite;
      transform-origin: 70% 70%;
    }
    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      10% { transform: rotate(20deg); }
      20% { transform: rotate(-10deg); }
      30% { transform: rotate(15deg); }
      40% { transform: rotate(-5deg); }
      50% { transform: rotate(10deg); }
      60% { transform: rotate(-5deg); }
      70% { transform: rotate(5deg); }
      80% { transform: rotate(-3deg); }
      90% { transform: rotate(3deg); }
    }

    /* ===== SIGNATURE IMAGE ===== */
    .signature-img {
      height: 30px;
      width: auto;
      filter: brightness(0) invert(1);
      mix-blend-mode: screen;
      transition: filter 0.3s ease;
    }
    body.light-mode .signature-img {
      filter: brightness(0) invert(0);
      mix-blend-mode: multiply;
    }

    /* ===== THEME TOGGLE ===== */
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 9997;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(10px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--accent-cyan);
      transition: all 0.3s ease;
    }
    .theme-toggle:hover {
      box-shadow: 0 0 20px var(--shadow-glow);
      transform: scale(1.1);
    }

    /* ===== NAVBAR no banner offset ===== */
    nav.fixed.top-0 { top: 0; }

    /* Aurora Background with MTW */
    .aurora-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .aurora-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('photos/mtw.jpeg') center/cover no-repeat;
      opacity: 0.25;
      filter: hue-rotate(200deg) saturate(0.6) brightness(0.4);
    }
    .aurora-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(0,245,255,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(191,0,255,0.08) 0%, transparent 45%),
        radial-gradient(ellipse at 40% 70%, rgba(0,255,136,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(0,245,255,0.06) 0%, transparent 40%);
      animation: auroraMove 20s ease-in-out infinite;
    }
    @keyframes auroraMove { 0%,100%{transform:translate(0,0) rotate(0deg);} 33%{transform:translate(2%,1%) rotate(1deg);} 66%{transform:translate(-1%,2%) rotate(-1deg);} }

    /* Glow */
    .glow-cyan { box-shadow: 0 0 25px rgba(0,245,255,0.5); }
    .glow-cyan-sm { box-shadow: 0 0 12px rgba(0,245,255,0.35); }

    /* Glass */
    .glass { background: rgba(10,14,23,0.75); backdrop-filter: blur(20px); border: 1px solid rgba(0,245,255,0.12); }

    /* Gradient Text */
    .gradient-text { background: linear-gradient(135deg, #00f5ff, #bf00ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* Buttons */
    .btn-primary { background: linear-gradient(135deg, #00f5ff, #bf00ff); box-shadow: 0 0 25px rgba(0,245,255,0.4); transition: all 0.35s cubic-bezier(0.4,0,0.2,1); }
    .btn-primary:hover { transform: scale(1.05) translateY(-3px); box-shadow: 0 0 40px rgba(0,245,255,0.6), 0 10px 30px rgba(0,0,0,0.3); }
    .btn-secondary { border: 2px solid #00f5ff; color: #00f5ff; transition: all 0.35s cubic-bezier(0.4,0,0.2,1); }
    .btn-secondary:hover { background: rgba(0,245,255,0.12); box-shadow: 0 0 30px rgba(0,245,255,0.4); transform: translateY(-3px); }

    /* Card */
    .card-hover { transition: all 0.4s cubic-bezier(0.4,0,0.2,1); cursor: pointer; }
    .card-hover:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 25px 60px rgba(0,245,255,0.18), 0 0 40px rgba(0,245,255,0.12); border-color: rgba(0,245,255,0.35); }

    /* Skill Bar */
    .skill-bar { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
    .skill-progress { height: 100%; background: linear-gradient(90deg, #00f5ff, #bf00ff, #00ff88); border-radius: 4px; transition: width 1.5s cubic-bezier(0.4,0,0.2,1); }

    /* Animations */
    @keyframes fadeInUp { from { opacity:0; transform:translateY(50px); } to { opacity:1; transform:translateY(0); } }
    .fade-in-up { opacity:0; animation: fadeInUp 0.9s cubic-bezier(0.4,0,0.2,1) forwards; }
    @keyframes fadeInLeft { from { opacity:0; transform:translateX(-50px); } to { opacity:1; transform:translateX(0); } }
    .fade-in-left { opacity:0; animation: fadeInLeft 0.9s cubic-bezier(0.4,0,0.2,1) forwards; }
    @keyframes fadeInRight { from { opacity:0; transform:translateX(50px); } to { opacity:1; transform:translateX(0); } }
    .fade-in-right { opacity:0; animation: fadeInRight 0.9s cubic-bezier(0.4,0,0.2,1) forwards; }

    @keyframes gridMove { 0%{transform:translate(0,0);} 100%{transform:translate(50px,50px);} }
    .hero-grid { background-image: linear-gradient(rgba(0,245,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.015) 1px, transparent 1px); background-size: 60px 60px; animation: gridMove 40s linear infinite; }

    @keyframes float { 0%,100%{transform:translateY(0) scale(1);opacity:0.4;} 50%{transform:translateY(-30px) scale(1.2);opacity:0.8;} }
    .particle { animation: float 6s ease-in-out infinite; }

    .nav-link { position: relative; color: #9ca3af; transition: color 0.3s ease; }
    .nav-link::after { content:''; position:absolute; bottom:-4px; left:0; width:0; height:2px; background: linear-gradient(90deg, #00f5ff, #bf00ff); transition: width 0.3s ease; }
    .nav-link:hover { color: #00f5ff; }
    .nav-link:hover::after { width: 100%; }

    .lang-dropdown { position: relative; }
    .lang-menu { position: absolute; right: 0; top: 100%; margin-top: 8px; min-width: 130px; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.3s ease; }
    .lang-dropdown:hover .lang-menu, .lang-menu:hover { opacity: 1; visibility: visible; transform: translateY(0); }

    @keyframes spin-slow { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
    .animate-spin-slow { animation: spin-slow 12s linear infinite; }
    @keyframes pulse-glow { 0%,100%{box-shadow:0 0 25px rgba(0,245,255,0.3),0 0 50px rgba(0,245,255,0.1);} 50%{box-shadow:0 0 40px rgba(0,245,255,0.5),0 0 80px rgba(0,245,255,0.2);} }
    .pulse-glow { animation: pulse-glow 3s ease-in-out infinite; }

    .reveal { opacity:0; transform:translateY(40px); transition: all 0.9s cubic-bezier(0.4,0,0.2,1); }
    .reveal.visible { opacity:1; transform:translateY(0); }

    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); z-index:1000; display:flex; align-items:center; justify-content:center; opacity:0; visibility:hidden; transition:all 0.3s ease; }
    .modal-overlay.active { opacity:1; visibility:visible; }
    .modal-content { background:rgba(10,14,23,0.95); border:1px solid rgba(0,245,255,0.3); border-radius:20px; padding:40px; max-width:350px; text-align:center; transform:scale(0.9); transition:transform 0.3s ease; }
    .modal-overlay.active .modal-content { transform:scale(1); }

    section { scroll-margin-top: 72px; }

    /* ===== MTW HEADER BANNER ===== */
    .mtw-header {
      position: relative;
      width: 100%;
      height: 300px;
      overflow: hidden;
      z-index: 1;
    }
    .mtw-header img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.6;
      filter: brightness(0.7) contrast(1.1);
    }
    .mtw-header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.95) 100%);
    }
    .mtw-header-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    .mtw-title {
      font-size: 3rem;
      font-family: 'Dancing Script', cursive;
      background: linear-gradient(135deg, #00f5ff, #bf00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(0,245,255,0.5);
      margin-bottom: 10px;
    }
    .mtw-subtitle {
      font-size: 1rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.3em;
      font-family: 'Poppins', sans-serif;
    }

    /* ===== ROBOT PRELOADER ===== */
    #preloader {
      position: fixed; inset: 0; z-index: 99999;
      background: #0a0a0a;
      overflow: hidden;
    }

    /* Robot Background - Full Screen */
    .robot-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .robot-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: drop-shadow(0 0 30px rgba(0,245,255,0.2));
      animation: robotPulse 3s ease-in-out infinite;
    }
    @keyframes robotPulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.02); opacity: 0.7; }
    }

    /* Welcome Text */
    .welcome-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
    }
    .welcome-text h2 {
      font-size: 4rem;
      font-family: 'Dancing Script', cursive;
      background: linear-gradient(135deg, #00f5ff, #bf00ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: welcomeGlow 2s ease-in-out infinite;
      margin-bottom: 20px;
    }
    @keyframes welcomeGlow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(0,245,255,0.5)); }
      50% { filter: drop-shadow(0 0 40px rgba(0,245,255,0.8)); }
    }
    .welcome-text p {
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      font-family: 'Poppins', sans-serif;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    /* Progress Bar */
    .progress-container {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      text-align: center;
      z-index: 10;
    }
    .progress-bar {
      width: 100%;
      height: 3px;
      background: rgba(0,245,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00f5ff, #bf00ff, #00ff88);
      border-radius: 2px;
      animation: progressLoad 2.5s ease-out forwards;
    }
    @keyframes progressLoad {
      0% { width: 0%; }
      80% { width: 90%; }
      100% { width: 100%; }
    }
    .progress-text {
      margin-top: 15px;
      font-size: 0.7rem;
      color: rgba(0,245,255,0.5);
      font-family: 'Poppins', sans-serif;
      letter-spacing: 0.15em;
    }

    /* Particles */
    .preload-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .preload-particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #00f5ff;
      border-radius: 50%;
      animation: floatParticle 6s ease-in-out infinite;
    }
    .preload-particle:nth-child(1) { left: 5%; top: 10%; animation-delay: 0s; }
    .preload-particle:nth-child(2) { left: 15%; top: 30%; animation-delay: 1s; }
    .preload-particle:nth-child(3) { left: 85%; top: 20%; animation-delay: 2s; }
    .preload-particle:nth-child(4) { left: 90%; top: 60%; animation-delay: 0.5s; }
    .preload-particle:nth-child(5) { left: 10%; top: 70%; animation-delay: 1.5s; }
    .preload-particle:nth-child(6) { left: 80%; top: 80%; animation-delay: 2.5s; }
    @keyframes floatParticle {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
      50% { transform: translateY(-40px) scale(1.5); opacity: 0.8; }
    }

    /* Preloader Fade Out */
    .preloader-fadeout {
      animation: preloaderExit 1.5s ease-in-out forwards;
    }
    @keyframes preloaderExit {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 0; transform: scale(1.2); visibility: hidden; }
    }

    /* ===== PAGE TRANSITION (Portfolio MP4 Style) ===== */
    .page-transition {
      position: fixed;
      inset: 0;
      z-index: 99998;
      pointer-events: none;
      display: none;
    }
    .page-transition.active {
      display: block;
    }
    .flip-page {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #0a0a0a 0%, #0d1117 100%);
      transform: rotateY(-90deg);
      transform-origin: left center;
      animation: pageFlip 0.6s ease-in-out forwards;
    }
    @keyframes pageFlip {
      0% { transform: rotateY(-90deg); }
      100% { transform: rotateY(0deg); }
    }
    .flip-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        rgba(0,245,255,0.1) 0%,
        rgba(0,245,255,0.3) 50%,
        rgba(191,0,255,0.1) 100%);
      animation: flipShine 0.6s ease-out forwards;
    }
    @keyframes flipShine {
      0% { opacity: 0; transform: translateX(-100%); }
      50% { opacity: 1; }
      100% { opacity: 0; transform: translateX(100%); }
    }

    /* ===== GLOW EFFECTS ===== */
    .glow-border {
      position: relative;
    }
    .glow-border::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(135deg, #00f5ff, #bf00ff, #00ff88);
      border-radius: inherit;
      z-index: -1;
      animation: borderGlow 3s ease-in-out infinite;
      opacity: 0.5;
    }
    @keyframes borderGlow {
      0%, 100% { opacity: 0.3; filter: blur(4px); }
      50% { opacity: 0.7; filter: blur(8px); }
    }

    /* ===== AURORA BACKGROUND ===== */
    .aurora-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .aurora-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(0,245,255,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(191,0,255,0.04) 0%, transparent 45%),
        radial-gradient(ellipse at 40% 70%, rgba(0,255,136,0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(0,245,255,0.04) 0%, transparent 40%);
      animation: auroraMove 20s ease-in-out infinite;
    }
    @keyframes auroraMove { 0%,100%{transform:translate(0,0) rotate(0deg);} 33%{transform:translate(2%,1%) rotate(1deg);} 66%{transform:translate(-1%,2%) rotate(-1deg);} }

    /* Photo frame */
    .photo-frame { position: relative; border-radius: 50%; }
    .photo-frame::before {
      content: '';
      position: absolute; inset: -5px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00f5ff, #bf00ff, #00ff88);
      z-index: -1;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    /* Timeline */
    .timeline-item { position: relative; padding-left: 2.5rem; }
    .timeline-item::before { content:''; position:absolute; left:0; top:8px; width:12px; height:12px; border-radius:50%; background:linear-gradient(135deg,#00f5ff,#bf00ff); box-shadow:0 0 14px rgba(0,245,255,0.5); }
    .timeline-item::after { content:''; position:absolute; left:5px; top:28px; bottom:-28px; width:2px; background:linear-gradient(180deg,rgba(0,245,255,0.4),transparent); }

    /* Pill tags */
    .tag-pill { border: 1px solid var(--border-color); background: var(--bg-card); transition: all 0.3s ease; }
    .tag-pill:hover { border-color: var(--accent-cyan); background: rgba(0,245,255,0.08); box-shadow: 0 0 15px var(--shadow-glow); }

    /* Hero Title Pills */
    .hero-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 0.9rem;
      border: 1.5px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-primary);
      transition: all 0.3s ease;
    }
    .hero-pill:hover {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 20px var(--shadow-glow);
      transform: translateY(-2px);
    }
    .hero-pill svg { color: var(--accent-cyan); }

    /* Skill grid */
    .skill-node { transition: all 0.3s ease; }
    .skill-node:hover { transform: translateY(-4px) scale(1.05); }

    /* Project tech tag */
    .tech-tag { background: rgba(0,245,255,0.06); border: 1px solid rgba(0,245,255,0.15); transition: all 0.2s ease; }
    .tech-tag:hover { background: rgba(0,245,255,0.12); border-color: rgba(0,245,255,0.35); }

    /* Social icon */

const LanguageSwitcher = () => {
  const { lang, setLang } = useI18n();
  const [isOpen, setIsOpen] = useState(false);
  const currentLang = languages.find(l=>l.code===lang)||languages[0];
  return (
    <div className="relative">
      <button onClick={()=>setIsOpen(!isOpen)} className="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/5 transition-all" style={{background:'rgba(10,14,23,0.7)',border:'1px solid rgba(0,245,255,0.15)'}}>
        <span>{currentLang.flag}</span>
        <span className="hidden sm:inline text-gray-300">{currentLang.label}</span>
        <i className={`fas fa-chevron-down text-xs transition-transform ${isOpen?'rotate-180':''}`}></i>
      </button>
      {isOpen&&(
        <div className="absolute right-0 mt-2 py-1.5 rounded-lg z-50" style={{background:'rgba(10,14,23,0.96)',backdropFilter:'blur(20px)',border:'1px solid rgba(0,245,255,0.12)',minWidth:'110px'}}>
          {languages.map(l=>(
            <button key={l.code} onClick={()=>{setLang(l.code);setIsOpen(false);}} className={`w-full px-4 py-2 text-left text-sm hover:bg-white/5 transition-all flex items-center gap-2 ${lang===l.code?'gradient-text':'text-gray-400'}`}>
              <span>{l.flag}</span><span>{l.label}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
};

            <svg className="absolute inset-0" viewBox="0 0 600 600" style={{overflow:'visible'}}>
              <circle cx={cx} cy={cy} r="170" fill="none" stroke="rgba(0,245,255,0.05)" strokeWidth="1" strokeDasharray="4 6"/>
              <circle cx={cx} cy={cy} r="80" fill="none" stroke="rgba(0,245,255,0.08)" strokeWidth="1"/>
              <circle cx={cx} cy={cy} r="2" fill="rgba(0,245,255,0.3)"/>

              {/* Orbit connection lines (core → related tools) */}
              {hoveredCore && coreConcepts.map(core => {
                if (core.name !== hoveredCore.name) return null;
                return hoveredCore.relatedTools.map(tName => {
                  const tIdx = outerTools.findIndex(t => t.name === tName);
                  if (tIdx < 0) return null;
                  const tp = getToolPos(outerTools[tIdx], tIdx, outerTools.length);
                  return <line key={tName} x1={cx} y1={cy} x2={tp.x} y2={tp.y} stroke={core.color} strokeWidth="0.5" strokeOpacity="0.25" strokeDasharray="3 3"/>;
                });
              })}
            </svg>

            {/* Center Core Node */}
            <div
              className="absolute flex flex-col items-center justify-center rounded-full cursor-default z-10"
              style={{
                left:'50%',top:'50%',
                transform:`translate(-50%,-50%) scale(${hoveredCore ? 1.08 : 1})`,
                width:'90px',height:'90px',
                background: 'radial-gradient(circle, rgba(0,245,255,0.12) 0%, rgba(10,14,23,0.95) 70%)',
                border:'1.5px solid rgba(0,245,255,0.3)',
                boxShadow: '0 0 40px rgba(0,245,255,0.15), inset 0 0 20px rgba(0,245,255,0.05)',
                transition:'all 0.5s cubic-bezier(0.4,0,0.2,1)',
              }}
            >
              <i className="fas fa-solar-system text-xl mb-1" style={{color:'rgba(0,245,255,0.6)'}}></i>
              <span className="text-xs font-bold" style={{color:'#00f5ff',fontFamily:"'Poppins',sans-serif"}}>CORE</span>
              <span className="text-xs text-gray-400 mt-0.5">Hover to explore</span>
            </div>

            {/* Core Concept Nodes (pentagon ring) */}
            {coreConcepts.map((core, i) => {
              const pos = getCorePos(core.angle);
              const isHovered = hoveredCore?.name === core.name;
              return (
                <div
                  key={core.name}
                  className="absolute flex flex-col items-center justify-center rounded-2xl cursor-pointer z-20"
                  style={{
                    left:'50%',top:'50%',
                    transform: `translate(-50%,-50%) translate(${pos.x - cx}px, ${pos.y - cy}px) scale(${isHovered ? 1.15 : 1})`,
                    width:'85px',height:'85px',
                    background: isHovered
                      ? `radial-gradient(circle, ${core.color}22 0%, rgba(10,14,23,0.95) 70%)`
                      : 'rgba(10,14,23,0.85)',
                    border:`1.5px solid ${isHovered ? core.color : 'rgba(0,245,255,0.12)'}`,
                    boxShadow: isHovered ? `0 0 30px ${core.color}44` : 'none',
                    transition:'all 0.5s cubic-bezier(0.4,0,0.2,1)',
                  }}
                  onMouseEnter={() => setHoveredCore(core)}
                  onMouseLeave={() => setHoveredCore(null)}
                >
                  <i className={`fas ${core.icon}`} style={{fontSize:'1.3rem',color:core.color,filter: isHovered ? `drop-shadow(0 0 8px ${core.color})` : 'none'}}></i>
                  <span className="text-xs font-medium mt-1 text-center leading-tight px-1" style={{color:'#fff',fontFamily:"'Poppins',sans-serif",fontSize:'0.65rem'}}>{core.name}</span>
                </div>
              );
            })}

            {/* Outer Tool Nodes */}
            {outerTools.map((tool, i) => {
              const pos = getToolPos(tool, i, outerTools.length);
              const highlighted = isToolHighlighted(tool.name);
              const dimmed = hoveredCore !== null && highlighted === false;
              return (
                <div
                  key={tool.name}
                  className="absolute flex items-center gap-2 rounded-xl cursor-pointer z-20"
                  style={{
                    left:'50%',top:'50%',
                    transform: `translate(-50%,-50%) translate(${pos.x - cx}px, ${pos.y - cy}px) scale(${dimmed ? 0.82 : 1})`,
                    padding:'7px 12px',
                    background: highlighted ? `${tool.color}18` : 'rgba(10,14,23,0.75)',
                    border:`1px solid ${highlighted ? tool.color + '66' : 'rgba(0,245,255,0.08)'}`,
                    opacity: dimmed ? 0.2 : (highlighted ? 1 : 0.75),
                    boxShadow: highlighted ? `0 0 18px ${tool.color}33` : 'none',
                    transition:'all 0.45s cubic-bezier(0.4,0,0.2,1)',
                  }}
                  onMouseEnter={() => setHoveredCore(coreConcepts.find(c => c.relatedTools.includes(tool.name)) || null)}
                  onMouseLeave={() => setHoveredCore(null)}
                >
                  <i className={`fab ${tool.icon}`} style={{fontSize:'0.85rem',color:tool.color}}></i>
                  <span className="text-xs whitespace-nowrap" style={{color:'rgba(255,255,255,0.7)',fontFamily:"'Poppins',sans-serif",fontSize:'0.65rem'}}>{tool.name}</span>
                </div>
              );
            })}

          </div>

          {/* Legend / Tooltip panel */}
          <div className="mt-8 text-center max-w-lg mx-auto min-h-[60px]">
            {hoveredCore ? (
              <div className="inline-block rounded-xl px-6 py-4" style={{background:'rgba(10,14,23,0.9)',border:`1px solid ${hoveredCore.color}44`,boxShadow:`0 0 20px ${hoveredCore.color}22`}}>
                <div className="flex items-center gap-2 mb-2">
                  <i className={`fas ${hoveredCore.icon}`} style={{color:hoveredCore.color,fontSize:'1rem'}}></i>
                  <span className="font-bold text-sm" style={{color:hoveredCore.color,fontFamily:"'Poppins',sans-serif"}}>{hoveredCore.name}</span>
                </div>
                <p className="text-xs text-gray-400">
                  相关技术栈: <span className="text-gray-300">{hoveredCore.relatedTools.join(' · ')}</span>
                </p>
              </div>
            ) : (
              <p className="text-xs text-gray-500" style={{letterSpacing:'0.1em'}}>
                将鼠标悬停在核心概念上，探索相关技术栈
              </p>
            )}
          </div>

        </div>
      </div>
    </section>
  );
};

// ==================== PROJECTS ====================
const Projects = ({ t }) => {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  const [active, setActive] = useState(0);
  const [dragging, setDragging] = useState(false);
  const [startX, setStartX] = useState(0);
  const dragRef = useRef(0);

  useEffect(()=>{const obs=new IntersectionObserver(([e])=>e.isIntersecting&&setVisible(true),{threshold:0.05});if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();},[]);

  const total = t.projects.items.length;

  const prev = () => setActive(a => (a - 1 + total) % total);
  const next = () => setActive(a => (a + 1) % total);

  // Touch/drag handlers
  const onPointerDown = (e) => { setDragging(true); setStartX(e.clientX); dragRef.current = 0; };
  const onPointerMove = (e) => { if (!dragging) return; dragRef.current = e.clientX - startX; };
  const onPointerUp = () => {
    if (!dragging) return;
    setDragging(false);
    if (dragRef.current < -60) next();
    else if (dragRef.current > 60) prev();
  };

  // Get card transform/style based on position offset from active
  const getCardStyle = (offset) => {
    const abs = Math.abs(offset);
    const isActive = offset === 0;
    const scale = isActive ? 1 : Math.max(0.75, 1 - abs * 0.18);
    const opacity = isActive ? 1 : Math.max(0.25, 1 - abs * 0.3);
    const translateX = offset * 52;
    const zIndex = isActive ? 10 : Math.max(1, 10 - abs * 3);
    const blur = abs > 1 ? (abs - 1) * 2 : 0;
    return { transform: `translateX(${translateX}%) scale(${scale})`, opacity, zIndex, filter: `blur(${blur}px)` };
  };

  const getVinylStyle = (offset) => {
    const abs = Math.abs(offset);
    const isActive = offset === 0;
    const scale = isActive ? 1 : Math.max(0.55, 1 - abs * 0.15);
    const opacity = isActive ? 0.9 : Math.max(0.1, 1 - abs * 0.35);
    const translateX = offset * 58;
    const rotateY = offset * 35;
    const zIndex = isActive ? 10 : Math.max(0, 10 - abs * 3);
    return {
      transform: `translateX(${translateX}%) scale(${scale}) rotateY(${rotateY}deg)`,
      opacity,
      zIndex,
      transition: dragging ? 'none' : 'all 0.6s cubic-bezier(0.4,0,0.2,1)'
    };
  };

  return (
    <section id="projects" ref={ref} className="py-28 px-6 overflow-hidden" style={{background:'linear-gradient(180deg,#0a0a0a 0%,#0d1117 100%)'}}>
      <div className="max-w-6xl mx-auto">
        <div className="text-center mb-12 reveal">
          <h2 className="section-title text-4xl md:text-5xl font-bold mb-4" style={{fontFamily:"'Poppins',sans-serif"}}><span className="gradient-text">{t.projects.title}</span></h2>
          <div className="w-20 h-0.5 mx-auto rounded-full" style={{background:'linear-gradient(90deg,transparent,#00f5ff,transparent)'}}></div>
        </div>

        {/* Carousel Stage */}
        <div
          className={`relative flex items-center justify-center min-h-[520px] select-none transition-all duration-700 ${visible?'opacity-100':'opacity-0'}`}
          style={{perspective:'1200px'}}
          onPointerDown={onPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={onPointerUp}
          onPointerLeave={onPointerUp}
        >
          {/* Arrow Left */}
          <button
            onClick={prev}
            className="absolute left-0 md:-left-4 z-20 w-12 h-12 rounded-full flex items-center justify-center transition-all"
            style={{background:'rgba(10,14,23,0.85)',border:'1px solid rgba(0,245,255,0.2)',color:'#00f5ff',backdropFilter:'blur(10px)'}}
            onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 0 20px rgba(0,245,255,0.4)';e.currentTarget.style.transform='scale(1.1)';}}
            onMouseLeave={e=>{e.currentTarget.style.boxShadow='none';e.currentTarget.style.transform='scale(1)';}}
          >
            <i className="fas fa-chevron-left"></i>
          </button>

          {/* Arrow Right */}
          <button
            onClick={next}
            className="absolute right-0 md:-right-4 z-20 w-12 h-12 rounded-full flex items-center justify-center transition-all"
            style={{background:'rgba(10,14,23,0.85)',border:'1px solid rgba(0,245,255,0.2)',color:'#00f5ff',backdropFilter:'blur(10px)'}}
            onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 0 20px rgba(0,245,255,0.4)';e.currentTarget.style.transform='scale(1.1)';}}
            onMouseLeave={e=>{e.currentTarget.style.boxShadow='none';e.currentTarget.style.transform='scale(1)';}}
          >
            <i className="fas fa-chevron-right"></i>
          </button>

          {/* Vinyl Records Background */}
          <div className="absolute inset-0 flex items-center justify-center pointer-events-none" style={{transform:'translateZ(-1px)'}}>
            {t.projects.items.map((p, i) => {
              const offset = ((i - active + total) % total);
              if (offset > 2) return null;
              const vs = getVinylStyle(offset - (offset > 1.5 ? total : 0));
              return (
                <div key={i} className="absolute w-72 h-72 rounded-full flex items-center justify-center"
                  style={{
                    ...vs,
                    background: 'radial-gradient(circle, rgba(0,245,255,0.06) 0%, rgba(191,0,255,0.03) 40%, transparent 70%)',
                    border: `1px solid ${offset === 0 ? 'rgba(0,245,255,0.25)' : 'rgba(0,245,255,0.06)'}`,
                    boxShadow: offset === 0 ? '0 0 60px rgba(0,245,255,0.08), inset 0 0 40px rgba(0,245,255,0.04)' : 'none',
                  }}>
                  {/* Vinyl grooves */}
                  {[40,60,80].map(r=>(
                    <div key={r} className="absolute rounded-full" style={{width:r+'%',height:r+'%',border:`1px solid rgba(255,255,255,${0.03*(100-r/1.5)})`}}></div>
                  ))}
                  {/* Label */}
                  <div className="w-16 h-16 rounded-full flex items-center justify-center text-xs font-bold" style={{background:'rgba(10,14,23,0.9)',border:'1px solid rgba(0,245,255,0.2)',color:'rgba(0,245,255,0.5)',fontFamily:"'Poppins',sans-serif"}}>
                    {p.name.substring(0,3)}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Project Cards */}
          <div className="relative flex items-center justify-center w-full max-w-4xl" style={{height:'380px',transform:'translateZ(0)'}}>
            {t.projects.items.map((p, i) => {
              const offset = ((i - active + total) % total);
              const cs = getCardStyle(offset - (offset > 1.5 ? total : 0));
              return (
                <div
                  key={i}
                  className="absolute w-full max-w-md rounded-2xl overflow-hidden cursor-pointer"
                  style={{
                    ...cs,
                    background:'rgba(10,14,23,0.92)',
                    border:`1px solid ${offset===0?'rgba(0,245,255,0.3)':'rgba(0,245,255,0.07)'}`,
                    boxShadow: offset===0 ? '0 20px 80px rgba(0,0,0,0.6), 0 0 40px rgba(0,245,255,0.08)' : '0 8px 30px rgba(0,0,0,0.4)',
                    transition: dragging ? 'none' : 'all 0.6s cubic-bezier(0.4,0,0.2,1)',
                  }}
                  onClick={() => !dragging && Math.abs(dragRef.current) < 10 && setActive(i)}
                >
                  {/* Header */}
                  <div className="h-40 relative flex items-center justify-center" style={{background:'linear-gradient(135deg,rgba(0,245,255,0.05) 0%,rgba(191,0,255,0.05) 100%)'}}>
                    <i className={`fas ${p.icon}`} style={{fontSize:'3rem',color:offset===0?'rgba(0,245,255,0.4)':'rgba(0,245,255,0.15)',transition:'all 0.4s ease'}}></i>
                    {/* vinyl shine */}
                    <div className="absolute inset-0 rounded-t-2xl" style={{background:'linear-gradient(135deg,rgba(255,255,255,0.03) 0%,transparent 50%)'}}></div>
                  </div>
                  {/* Body */}
                  <div className="p-6">
                    <h3 className="font-bold mb-2 text-base leading-snug" style={{fontFamily:"'Poppins',sans-serif",color:'#fff'}}>{p.name}</h3>
                    <p className="text-xs mb-4 leading-relaxed" style={{color:'rgba(0,245,255,0.55)'}}>
                      <i className="fas fa-lightbulb mr-1" style={{color:'#bf00ff'}}></i>{p.problem}
                    </p>
                    {/* Tech tags */}
                    <div className="flex flex-wrap gap-1.5 mb-5">
                      {p.tech.split(' / ').map(tag=>(
                        <span key={tag} className="tech-tag px-2 py-0.5 text-xs rounded" style={{color:'rgba(255,255,255,0.45)'}}>{tag}</span>
                      ))}
                    </div>
                    {/* Links */}
                    <div className="flex items-center gap-5 text-xs pt-3" style={{borderTop:'1px solid rgba(0,245,255,0.07)'}}>
                      <a href={p.link} target="_blank" rel="noopener noreferrer" className="flex items-center gap-1.5 transition-colors" style={{color: offset===0?'rgba(0,245,255,0.7)':'rgba(0,245,255,0.3)'}} onMouseEnter={e=>e.currentTarget.style.color='#00f5ff'} onMouseLeave={e=>e.currentTarget.style.color=''}>
                        <i className="fab fa-github"></i>Code
                      </a>
                      <span className="flex items-center gap-1.5 cursor-not-allowed" style={{color:'rgba(255,255,255,0.15)'}}>
                        <i className="fas fa-external-link-alt"></i>Demo
                      </span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Dot indicators */}
        <div className="flex justify-center gap-3 mt-10">
          {t.projects.items.map((_, i) => (
            <button
              key={i}
              onClick={() => setActive(i)}
              className="rounded-full transition-all duration-300"
              style={{
                width: i === active ? 28 : 8,
                height: 8,
                background: i === active ? 'linear-gradient(90deg,#00f5ff,#bf00ff)' : 'rgba(255,255,255,0.1)',
                border: `1px solid ${i === active ? 'rgba(0,245,255,0.5)' : 'rgba(0,245,255,0.1)'}`,
                boxShadow: i === active ? '0 0 12px rgba(0,245,255,0.4)' : 'none',
              }}
            />
          ))}
        </div>

        {/* Drag hint */}
        <p className="text-center text-xs mt-4" style={{color:'rgba(255,255,255,0.2)'}}>
          <i className="fas fa-hand-pointer mr-1"></i>左右滑动或点击箭头切换
        </p>
      </div>
    </section>
  );
};

// ==================== I18N PROVIDER ====================
const I18nProvider = ({ children }) => {
  const [lang, setLang] = useState(()=>localStorage.getItem('portfolio-lang-v4')||'zh-CN');
  useEffect(()=>localStorage.setItem('portfolio-lang-v4',lang),[lang]);
  return <I18nContext.Provider value={{lang,setLang}}>{children}</I18nContext.Provider>;
};

// ==================== APP ====================
const App = () => {
  useEffect(()=>{
    const obs=new IntersectionObserver(entries=>entries.forEach(e=>e.isIntersecting&&e.target.classList.add('visible')),{threshold:0.08});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  },[]);
  useEffect(()=>{
    const handleScroll=()=>{
      const scrollTop=window.scrollY;
      const docHeight=document.documentElement.scrollHeight-window.innerHeight;
      const progress=(scrollTop/docHeight)*100;
      const pb=document.getElementById('scrollProgress');
      if(pb)pb.style.width=progress+'%';
      const sections=['home','about','skills','projects','achievements','contact'];
      const dots=document.querySelectorAll('.dot-nav a');
      sections.forEach(id=>{
        const el=document.getElementById(id);
        if(!el)return;
        const rect=el.getBoundingClientRect();
        if(rect.top<=window.innerHeight/2&&rect.bottom>=window.innerHeight/2){
          dots.forEach(d=>d.classList.remove('active'));
          const a=document.querySelector('.dot-nav a[href="#'+id+'"]');
          if(a)a.classList.add('active');
        }
      });
    };
    window.addEventListener('scroll',handleScroll,{passive:true});
    return()=>window.removeEventListener('scroll',handleScroll);
  },[]);
  const {lang}=useI18n();
  const t=translations[lang]||translations['zh-CN'];
  return(
    <div className="relative min-h-screen" style={{background:'#0a0a0a'}}>
      <div className="aurora-bg"></div>
      <Navbar t={t}/>
      <main>
        <Header t={t}/>
        <About t={t}/>
        <Skills t={t}/>
        <Projects t={t}/>
        <Achievements t={t}/>
        <Contact t={t}/>
      </main>
      <Footer t={t}/>
    </div>
  );
};

// ==================== THEME TOGGLE ====================
const initTheme = () => {
  const savedTheme = localStorage.getItem('portfolio-theme');
  const themeIcon = document.getElementById('themeIcon');
  if (savedTheme === 'light') {
    document.body.classList.add('light-mode');
    if (themeIcon) themeIcon.textContent = '☀️';
  }
};

const toggleTheme = () => {
  const isLight = document.body.classList.toggle('light-mode');
  const themeIcon = document.getElementById('themeIcon');
  if (themeIcon) {
    themeIcon.textContent = isLight ? '☀️' : '🌙';
  }
  localStorage.setItem('portfolio-theme', isLight ? 'light' : 'dark');
};

// Initialize theme on load
document.addEventListener('DOMContentLoaded', initTheme);

// ==================== PRELOADER ====================
const runPreloader = () => {
  const preloader = document.getElementById('preloader');
  if (!preloader) return;

  // Show preloader for 2.5 seconds, then fade out
  setTimeout(() => {
    preloader.classList.add('preloader-fadeout');
    setTimeout(() => {
      preloader.style.display = 'none';
    }, 1000);
  }, 2500);
};

// ==================== ROOT ====================
const RootApp = () => (
  <I18nProvider>
    <App />
  </I18nProvider>
);
ReactDOM.createRoot(document.getElementById('root')).render(<RootApp />);
// Theme toggle event
document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);

window.addEventListener('load', () => { setTimeout(runPreloader, 400); });
  </script>

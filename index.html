  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    let animationId;
    const animate = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      glowRef.current.x += (mouseRef.current.x - glowRef.current.x) * 0.06;
      glowRef.current.y += (mouseRef.current.y - glowRef.current.y) * 0.06;
      const gradient = ctx.createRadialGradient(glowRef.current.x, glowRef.current.y, 0, glowRef.current.x, glowRef.current.y, 350);
      gradient.addColorStop(0, 'rgba(0, 245, 255, 0.1)');
      gradient.addColorStop(0.4, 'rgba(191, 0, 255, 0.04)');
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      animationId = requestAnimationFrame(animate);
    };
    animate();
    const handleMouseMove = (e) => { mouseRef.current.x = e.clientX; mouseRef.current.y = e.clientY; };
    window.addEventListener('mousemove', handleMouseMove);
    return () => { window.removeEventListener('resize', resize); window.removeEventListener('mousemove', handleMouseMove); cancelAnimationFrame(animationId); };
  }, []);
  return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-[1]" style={{ mixBlendMode: 'screen' }} />;
};
